services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kazihq
      POSTGRES_PASSWORD: kazihq
      POSTGRES_DB: kazihq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kazihq"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - apps/api/.env
    environment:
      # Always override whatever DATABASE_URL is in apps/api/.env: that file
      # is also used for `npm run dev:api` outside Docker, where Postgres is
      # reached via `localhost`. Inside this compose network Postgres is only
      # reachable via the service name `postgres` -- using the .env value
      # as-is here would silently point at the wrong host and crash-loop the
      # container. `environment:` takes precedence over `env_file:` for the
      # same key, so this is authoritative regardless of what's in .env.
      DATABASE_URL: postgresql://kazihq:kazihq@postgres:5432/kazihq?schema=public
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - apps/web/.env
    ports:
      - "3000:3000"

volumes:
  postgres_data:
