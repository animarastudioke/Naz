<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payments — KaziHQ</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <h1 class="text-2xl font-semibold">Payments</h1>
      <p class="text-secondary mt-1 mb-3">M-Pesa, card, bank transfer and cash — reconciled in one ledger.</p>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Client</th><th>Invoice</th><th>Method</th><th>Amount</th><th>Status</th><th>Reconciled</th></tr></thead>
          <tbody id="payments-body"></tbody>
        </table>
        <div class="empty-state" id="empty-state" style="display:none;">No payments recorded yet.</div>
      </div>
    </main>
  </div>

  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script>
    if (KaziUI.initDashboardShell()) {
      KaziAPI.get("/payments").then(render).catch(function () {});
    }

    function render(payments) {
      document.getElementById("empty-state").style.display = payments.length === 0 ? "block" : "none";
      document.getElementById("payments-body").innerHTML = payments
        .map(function (p) {
          return (
            "<tr><td>" + KaziUI.formatDate(p.createdAt) + "</td>" +
            "<td>" + (p.client ? KaziUI.escapeHtml(p.client.fullName) : "—") + "</td>" +
            "<td>" + (p.invoice ? KaziUI.escapeHtml(p.invoice.number) : "—") + "</td>" +
            "<td>" + KaziUI.escapeHtml(p.method) + "</td>" +
            "<td>" + KaziUI.money(p.amount) + "</td>" +
            "<td>" + KaziUI.badgeHtml(p.status) + "</td>" +
            "<td>" + (p.reconciled ? "Yes" : "No") + "</td></tr>"
          );
        })
        .join("");
    }
  </script>
</body>
</html>
