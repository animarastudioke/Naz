<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Analytics — KaziHQ</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <h1 class="text-2xl font-semibold">Analytics</h1>
      <p class="text-secondary mt-1">Conversion, growth and demand forecasting.</p>

      <div class="grid-stats mt-3" style="grid-template-columns:repeat(2,1fr);">
        <div class="card stat-tile">
          <p class="stat-label">Quotation approval rate</p>
          <p class="stat-value" id="approval-rate">—</p>
          <p class="text-xs text-muted mt-1" id="approval-detail"></p>
        </div>
        <div class="card stat-tile">
          <p class="stat-label">Booking completion rate</p>
          <p class="stat-value" id="completion-rate">—</p>
          <p class="text-xs text-muted mt-1" id="completion-detail"></p>
        </div>
      </div>

      <div class="grid-2 mt-3">
        <div class="card">
          <div class="card-header"><h3 class="card-title">New clients — last 6 months</h3></div>
          <div id="acquisition-chart"></div>
        </div>
        <div class="card">
          <div class="card-header"><h3 class="card-title">Demand forecast (next 4 weeks)</h3></div>
          <p class="text-sm text-secondary mb-2" id="forecast-summary"></p>
          <div id="forecast-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/charts.js"></script>
  <script>
    if (KaziUI.initDashboardShell()) {
      KaziAPI.get("/analytics/conversion-rates").then(function (data) {
        document.getElementById("approval-rate").textContent = data.quotationApprovalRate + "%";
        document.getElementById("approval-detail").textContent = data.totalQuotations + " quotations sent";
        document.getElementById("completion-rate").textContent = data.bookingCompletionRate + "%";
        document.getElementById("completion-detail").textContent = data.totalBookings + " bookings total";
      }).catch(function () {});

      KaziAPI.get("/analytics/customer-acquisition?months=6").then(function (data) {
        var points = data.map(function (a) {
          return { label: new Date(a.month).toLocaleDateString("en-KE", { month: "short" }), value: a.newClients };
        });
        KaziCharts.renderTrendLineChart("acquisition-chart", points, "");
      }).catch(function () { KaziCharts.renderTrendLineChart("acquisition-chart", [], ""); });

      KaziAPI.get("/ai/demand-forecast").then(function (data) {
        document.getElementById("forecast-summary").textContent =
          "Averaging " + data.averageBookingsPerWeek + " bookings/week based on recent trailing history.";
        document.getElementById("forecast-grid").innerHTML = data.next4WeeksForecast
          .map(function (w) {
            return (
              '<div style="border:1px solid var(--line-hairline);border-radius:8px;padding:12px;text-align:center;">' +
              '<p class="text-xs text-muted">Week ' + w.week + '</p>' +
              '<p class="text-lg font-semibold">' + w.estimatedBookings + "</p></div>"
            );
          })
          .join("");
      }).catch(function () {});
    }
  </script>
</body>
</html>
